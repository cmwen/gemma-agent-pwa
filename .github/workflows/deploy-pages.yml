name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Configure build environment
        env:
          PAGES_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          echo "VITE_BASE_PATH=/${REPOSITORY_NAME}/" >> "$GITHUB_ENV"
          if [ -n "${PAGES_API_BASE_URL}" ]; then
            echo "VITE_API_BASE_URL=${PAGES_API_BASE_URL}" >> "$GITHUB_ENV"
          else
            echo "VITE_API_BASE_URL=http://127.0.0.1:8787/api" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
